name: Bump Version; Build and Push Docker Images
on:
  push:
    branches:
      - main
    paths-ignore:
      - VERSION
  workflow_dispatch:

jobs:
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Get original commit message
        run: echo "ORIG_MSG=$(git log -1 --pretty=%s HEAD)" >> $GITHUB_ENV

      - name: Bump patch version
        if: ${{ github.event_name != 'schedule' }}
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION)
          else
            VERSION="0.0.0"
          fi
          IFS='.' read -r major minor patch <<< "$VERSION"
          patch=$((patch + 1))
          NEW_VERSION="$major.$minor.$patch"
          echo "$NEW_VERSION" > VERSION
          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Commit bumped version
        run: |
          git config user.name "gitea-actions"
          git config user.email "actions@gitea"
          git add VERSION
          git commit -m "chore: bump version to ${{ env.VERSION }} [skip ci]"
          git push
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: bump-version
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get current version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Log in to Local Docker Registry
        run: docker login $REGISTRY_HOST -u $REGISTRY_USER -p $REGISTRY_PASSWORD
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}

      - name: Set base image name from repo
        run: echo "IMAGE=${REGISTRY_USER}/${GITHUB_REPOSITORY##*/}" >> $GITHUB_ENV
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}

      - name: Build & Push Backend Image
        run: |
          docker build \
            -t $REGISTRY_HOST/$IMAGE-backend:$VERSION \
            -t $REGISTRY_HOST/$IMAGE-backend:latest \
            ./backend
          docker push $REGISTRY_HOST/$IMAGE-backend:$VERSION
          docker push $REGISTRY_HOST/$IMAGE-backend:latest
        env:
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}

      - name: Build & Push Frontend Image
        run: |
          docker build \
            -t $REGISTRY_HOST/$IMAGE-frontend:$VERSION \
            -t $REGISTRY_HOST/$IMAGE-frontend:latest \
            -f ./frontend/Dockerfile ./frontend
          docker push $REGISTRY_HOST/$IMAGE-frontend:$VERSION
          docker push $REGISTRY_HOST/$IMAGE-frontend:latest
        env:
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}

      - name: Send finished notification
        env:
          TITLE: "GITEA-Actions"
          MESSAGE: "Commit by ${{ github.actor }}. ${{ env.IMAGE }}:${{ env.VERSION }} has been compiled and pushed"
        run: |
          curl -X POST "${{ secrets.NOTIFICATION_URL }}" \
            -H "X-API-Key: ${{ secrets.MATRIX_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"title\": \"$TITLE\", \"message\": \"$MESSAGE\"}"
